<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="app">
        <a href="https://www.google.com"
        v-on:click.prevent="buttonClick('Vue is Exciting - div', 'hello', $event)">Google</a>
        <input type="text" v-on:keyup.enter.ctrl="pressEnter"/>
        <div v-on:click.once="buttonClick('Vue is Exciting - div', 'hello', $event)">
            Something Exciting
            <button v-on:click.stop="buttonClick('Vue is Exciting', 'hello', $event)">Click Me</button>
            <p>
                x: {{ x }}
                y: {{ y }}
            </p>
        </div>
    </div>
</body>
<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        
        setup(){
            let x = ref(0);
            let y = ref(0);
            function buttonClick(newMessage, newMessage2, event){
                x.value = event.x;
                y.value = event.y;
                /*console.log(event);
                alert(newMessage);
                alert(newMessage2);*/
            }
            function pressEnter(){
                alert("Enter key Pressed")
            }
            return {
                buttonClick,
                x,
                y,
                pressEnter,
            };
        },

    }).mount("#app");
</script>
</html>
