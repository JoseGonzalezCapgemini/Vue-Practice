<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="app" class="container">
        <div class="bg-info p-5 rounded m-5">
            <h2 class="h2 text-center">Learn Vue - MovieOPedia</h2>
            <hr />
            <div class="input-group mb-3">
                <span class="input-group-text">Title</span>
                <input type="text" class="form-control" v-model="newMovie.title" />
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text">Year</span>
                <input type="text" class="form-control" v-model="newMovie.year" />
            </div>
            <div class="text-center pb-3">
                <button @click="addMovie()" class="btn btn-secondary m-2 w-25">Add Movie</button>
            </div>
            <div class="text-center pb-3">
                <button v-on:click="removeMovie()" class="btn btn-danger m-2 w-25">Remove Movie</button>
            </div>
            <div class="border p-3 w-50 mx-auto">
                <div class="text-center">
                    <h4 class="text-center">Movie List</h4>
                    <span class="text-danger" v-if="showMessage">You can only add 5 movies</span>
                    <hr />
                </div>
                <ul class="list-group">
                    <li v-for="movie in getAllMovies" class="list-group-item">{{movie}}</li>
                </ul>
            </div>
        </div>

    </div>
    <script>
        const { createApp, ref, reactive, computed, watch } = Vue;
        createApp({
            setup(){

                let movies = reactive([
                    {title:"Movie 1", year: 2000},
                    {title:"Movie 2", year: 2001},
                    {title:"Movie 3", year: 2002}, 
                ])

                let showMessage = ref(false);

                let newMovie = reactive({title: "", year: ""});
                function addMovie(){
                    //movies.push({...newMovie});
                    if(movies.length < 5){
                        movies.push({title: newMovie.title, year:newMovie.year});
                        newMovie.title = "";
                        newMovie.year = "";
                    }else{
                        alert("You cannot add more than 5 movies");
                    }
                    
                }

                const getAllMovies = computed(()=>{
                    return movies.map((movie)=>{
                        return `${movie.title} was released in ${movie.year}`
                    })
                });

                watch(movies, async()=>{
                    //movies.length >= 5 ? showMessage.value=true : showMessage.value= false;
                    if (movies.length >= 3){
                        setTimeout(() =>{
                            showMessage.value = true;
                        }, 3000);
                    }else{
                        showMessage.value = false;
                    }
                });

                function removeMovie(){
                    movies.pop();
                }

                return {newMovie, movies, addMovie, removeMovie, getAllMovies, showMessage};
            }
        }).mount("#app");    
    </script>
</body>
</html>
