<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="app">
        <div>Learn Vue</div>
        <p>{{obj.count}}</p>
        <p>{{counter}}</p>
        <p>{{getFullName}}</p>
        <!--<button v-on:click="counter++">Increment</button>
        <button v-on:click="counter--">Decrement</button>-->
        <button v-on:click="obj.count++">Increment</button>
        <button v-on:click="obj.count--">Decrement</button>
        <input type="text" v-model="firstName" />
        <br /><br />
        Name:
        <input type="text" v-model.trim="name" />
        <br/> <br/>
        Age:
        <input type="number" v-model.lazy="age" />
        <p>{{name}} is {{age}} years old</p>
    </div>
    <script>
        const { createApp, ref, reactive, computed, watch } = Vue;
        let name = ref("Vue 3");
        let age = ref(20);

        createApp({
            setup(){
                let counter = ref(0);
                const obj = reactive({count: 0});
                let firstName = ref("Ben");
                let lastName = ref("Hector");

                /*watch(()=> counter.value, (newValue, oldValue)=>{
                    console.log("Counter value changed from ", oldValue, " to ", newValue);
                    if(newValue==5) alert("Counter Value is 5")
                })*/
                watch(()=> obj.count, (newValue, oldValue)=>{
                    console.log("Counter value changed from ", oldValue, " to ", newValue);
                    if(newValue==5) alert("Counter Value is 5")
                })

                const getFullName= computed((prev)=>{
                    console.log("prev: ", prev);
                    if(prev=="Ben"){
                        console.log("Ben")
                    }
                    console.log("getFullName was called");
                    return firstName.value + " " + lastName.value;
                });
                return{
                    name,
                    age,
                    getFullName,
                    counter,
                    firstName,
                    obj,
                };
            },
        }).mount("#app");
    </script>
</body>
</html>
